<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .nav-search{transition:border-color .25s ease,color .25s ease,box-shadow .25s ease;}
  .nav-search:hover{border-color:#0095DA;color:#fff;box-shadow:0 0 0 4px rgba(0,149,218,.14);}
  @keyframes srchFade{from{opacity:0}to{opacity:1}}
  @keyframes srchPop{from{opacity:0;transform:translateY(-14px) scale(.99)}to{opacity:1;transform:none}}
  .srch-back{animation:srchFade .25s ease;}
  .srch-card{animation:srchPop .28s cubic-bezier(.2,.8,.2,1);}
  .srch-item{transition:background .15s ease,border-color .15s ease;cursor:pointer;border:1px solid transparent;}
  .srch-item:hover,.srch-item.on{background:rgba(0,149,218,.1);border-color:rgba(0,149,218,.4);}
  .srch-item.on .si-arrow{opacity:1;color:#0095DA;}
  .si-arrow{opacity:0;transition:opacity .15s ease;}
  .srch-input{width:100%;background:transparent;border:none;outline:none;color:#fff;font-family:'Archivo',sans-serif;font-size:clamp(20px,2.6vw,30px);font-weight:600;letter-spacing:-0.01em;}
  .srch-input::placeholder{color:rgba(255,255,255,.28);}
  .srch-key{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.18);border-radius:3px;padding:3px 7px;}
  .srch-chip{transition:border-color .2s ease,color .2s ease;cursor:pointer;}
  .srch-chip:hover{border-color:#0095DA;color:#fff;}
  @media(prefers-reduced-motion:reduce){.srch-back,.srch-card{animation:none;}}
</style>
</helmet>
<sc-if value="{{ searchOpen }}" hint-placeholder-val="{{ false }}">
  <div class="srch-back" onClick="{{ closeSearch }}" style="position:fixed; inset:0; z-index:150; background:rgba(8,9,10,.92); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); display:flex; justify-content:center; padding:clamp(60px,10vh,120px) clamp(16px,4vw,40px) 40px; overflow-y:auto; font-family:'Archivo',sans-serif;">
    <div class="srch-card" onClick="{{ stopProp }}" style="position:relative; width:min(720px,100%); height:fit-content; background:#16181b; border:1px solid rgba(255,255,255,.12); border-radius:6px; box-shadow:0 50px 120px rgba(0,0,0,.6); overflow:hidden;">
      <div style="position:absolute; inset:0; background-image:linear-gradient(rgba(0,149,218,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,149,218,.04) 1px,transparent 1px); background-size:34px 34px; pointer-events:none;"></div>
      <div style="position:relative; display:flex; align-items:center; gap:16px; padding:22px clamp(20px,3vw,30px); border-bottom:1px solid rgba(255,255,255,.1);">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0095DA" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="width:22px; height:22px; flex:0 0 auto;"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
        <input id="srch-field" class="srch-input" type="text" value="{{ query }}" onInput="{{ onQuery }}" placeholder="Rechercher produits, codes, catalogues, pages..." autocomplete="off" spellcheck="false">
        <span class="srch-key" style="flex:0 0 auto;">ESC</span>
      </div>
      <div style="position:relative; max-height:min(56vh,520px); overflow-y:auto; padding:14px clamp(14px,2vw,20px) 18px;">
        <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ false }}">
          <sc-for list="{{ groups }}" as="g" hint-placeholder-count="3">
            <div style="margin-top:10px;">
              <div style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:1.6px; color:rgba(255,255,255,.4); padding:8px 12px;">{{ g.label }}</div>
              <sc-for list="{{ g.items }}" as="it" hint-placeholder-count="3">
                <a href="{{ it.href }}" onClick="{{ it.go }}" class="{{ it.cls }}" style="display:flex; align-items:center; gap:14px; padding:12px 12px; border-radius:4px; text-decoration:none;">
                  <span style="flex:0 0 auto; width:34px; height:34px; border-radius:3px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.03); color:#0095DA; display:flex; align-items:center; justify-content:center;">{{ it.icon }}</span>
                  <span style="min-width:0; flex:1;"><span style="display:block; font-size:15px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ it.title }}</span><span style="display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.4px; color:rgba(255,255,255,.45); margin-top:2px;">{{ it.sub }}</span></span>
                  <span class="si-arrow" style="flex:0 0 auto; font-size:15px; color:rgba(255,255,255,.5);">↵</span>
                </a>
              </sc-for>
            </div>
          </sc-for>
        </sc-if>
        <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
          <div style="padding:40px 16px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:1px; color:rgba(255,255,255,.45);">AUCUN RÉSULTAT POUR „{{ query }}"</div>
        </sc-if>
        <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ true }}">
          <div>
            <sc-if value="{{ hasRecent }}" hint-placeholder-val="{{ false }}">
              <div style="margin-top:6px;"><div style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:1.6px; color:rgba(255,255,255,.4); padding:8px 12px;">RECHERCHES RÉCENTES</div><div style="display:flex; flex-wrap:wrap; gap:8px; padding:4px 12px 6px;"><sc-for list="{{ recents }}" as="r" hint-placeholder-count="3"><button type="button" onClick="{{ r.go }}" class="srch-chip" style="background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:7px 14px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.5px; color:rgba(255,255,255,.7);">{{ r.label }}</button></sc-for></div></div>
            </sc-if>
            <div style="margin-top:6px;"><div style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:1.6px; color:rgba(255,255,255,.4); padding:8px 12px;">PRODUITS POPULAIRES</div><div style="display:flex; flex-wrap:wrap; gap:8px; padding:4px 12px 6px;"><sc-for list="{{ popular }}" as="p" hint-placeholder-count="4"><button type="button" onClick="{{ p.go }}" class="srch-chip" style="background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:7px 14px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.5px; color:rgba(255,255,255,.7);">{{ p.label }}</button></sc-for></div></div>
            <div style="margin-top:10px;"><div style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:1.6px; color:rgba(255,255,255,.4); padding:8px 12px;">ACCÈS RAPIDE</div><sc-for list="{{ quickLinks }}" as="q" hint-placeholder-count="5"><a href="{{ q.href }}" class="srch-item" style="display:flex; align-items:center; gap:14px; padding:11px 12px; border-radius:4px; text-decoration:none;"><span style="flex:0 0 auto; width:30px; height:30px; border-radius:3px; border:1px solid rgba(255,255,255,.12); color:#0095DA; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:11px;">→</span><span style="font-size:14px; font-weight:600; color:#fff;">{{ q.label }}</span></a></sc-for></div>
          </div>
        </sc-if>
      </div>
      <div style="position:relative; display:flex; align-items:center; gap:18px; padding:12px clamp(18px,2.5vw,24px); border-top:1px solid rgba(255,255,255,.1); font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.8px; color:rgba(255,255,255,.4);">
        <span style="display:inline-flex; align-items:center; gap:6px;"><span class="srch-key">↑</span><span class="srch-key">↓</span> naviguer</span>
        <span style="display:inline-flex; align-items:center; gap:6px;"><span class="srch-key">↵</span> ouvrir</span>
        <span style="display:inline-flex; align-items:center; gap:6px; margin-left:auto;"><span class="srch-key">⌘ K</span> partout</span>
      </div>
    </div>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:520}}">
class Component extends DCLogic {
  state = { searchOpen:false, query:'', sActive:0 };

  componentDidMount(){
    this._click = (e)=>{ const t=e.target; if(t && t.closest && t.closest('.dekor-search-trigger')){ e.preventDefault(); this.open(); } };
    document.addEventListener('click', this._click);
    this._openEvt = ()=>this.open();
    window.addEventListener('dekor-search-open', this._openEvt);
    this._key = (e)=>{
      if((e.metaKey||e.ctrlKey) && (e.key==='k'||e.key==='K')){ e.preventDefault(); this.toggle(); return; }
      if(!this.state.searchOpen) return;
      if(e.key==='Escape'){ this.close(); }
      else if(e.key==='ArrowDown'){ e.preventDefault(); this.move(1); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); this.move(-1); }
      else if(e.key==='Enter'){ e.preventDefault(); this.openSel(); }
    };
    window.addEventListener('keydown', this._key);
  }
  componentWillUnmount(){ document.removeEventListener('click', this._click); window.removeEventListener('dekor-search-open', this._openEvt); window.removeEventListener('keydown', this._key); }

  open(){ this.setState({ searchOpen:true, sActive:0 }); try{ document.body.style.overflow='hidden'; }catch(e){} setTimeout(()=>{ const el=document.getElementById('srch-field'); if(el) el.focus(); }, 60); }
  close(){ this.setState({ searchOpen:false }); try{ document.body.style.overflow=''; }catch(e){} }
  toggle(){ if(this.state.searchOpen) this.close(); else this.open(); }
  onSearch(v){ this.setState({ query:v, sActive:0 }); }
  move(d){ const n=this._flatCount||0; if(!n) return; let i=this.state.sActive+d; if(i<0) i=n-1; if(i>=n) i=0; this.setState({ sActive:i }); }
  openSel(){ const f=this._flat||[]; const it=f[this.state.sActive]; if(it){ this._saveRecent(this.state.query); window.location.href=it.href; } }
  _saveRecent(q){ q=(q||'').trim(); if(!q) return; try{ let a=JSON.parse(window.localStorage.getItem('dekorSearchRecent')||'[]'); a=a.filter(x=>x.toLowerCase()!==q.toLowerCase()); a.unshift(q); a=a.slice(0,5); window.localStorage.setItem('dekorSearchRecent',JSON.stringify(a)); }catch(e){} }

  renderVals(){
    const R=React.createElement;
    const _sq=(this.state.query||'').trim().toLowerCase();
    const icon=R('svg',{width:15,height:15,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.7,strokeLinecap:'round',strokeLinejoin:'round'},[R('rect',{key:0,x:4,y:4,width:16,height:16,rx:1}),R('path',{key:1,d:'M4 9h16'})]);
    const SINDEX=[
      {g:'PRODUITS',title:'Spatule professionnelle',sub:'DKR-3017 · Outils de spatule',href:'Decor Product Detail.fr.dc.html',code:'DKR-3017'},
      {g:'PRODUITS',title:'Cadre de rouleau pro 240mm',sub:'DKR-4200 · Outils de peinture',href:'Decor Category.fr.dc.html',code:'DKR-4200'},
      {g:'PRODUITS',title:'Grattoir dur 150mm',sub:'DKR-3120 · Outils de spatule',href:'Decor Product Detail.fr.dc.html',code:'DKR-3120'},
      {g:'PRODUITS',title:'Niveau à bulle aluminium 60cm',sub:'DKR-7750 · Outils de mesure',href:'Decor Category.fr.dc.html',code:'DKR-7750'},
      {g:'PRODUITS',title:'Truelle en acier inoxydable',sub:'DKR-1180 · Enduit',href:'Decor Category.fr.dc.html',code:'DKR-1180'},
      {g:'CATÉGORIES',title:'Outils de peinture',sub:'FAM-01 · 96 Produkte',href:'Decor Category.fr.dc.html'},
      {g:'CATÉGORIES',title:'Outils de plâtre / spatule',sub:'FAM-04 · 63 Produkte',href:'Decor Category.fr.dc.html'},
      {g:'CATÉGORIES',title:'Outils de mesure',sub:'FAM-06 · 41 Produkte',href:'Decor Products.fr.dc.html'},
      {g:'PAGES',title:'Fabrication',sub:'Intégré verticalement · 21.000 m²',href:'Decor Manufacturing.fr.dc.html'},
      {g:'PAGES',title:'Export',sub:'60 pays · 4 continents',href:'Decor Export.fr.dc.html'},
      {g:'PAGES',title:'Centre d’assistance',sub:'Aide, fichiers téléchargeables et FAQ',href:'Decor Support.fr.dc.html'},
      {g:'PAGES',title:'Revendeurs agréés',sub:'Trouvez un revendeur Dekor',href:'Decor Authorized Dealers.fr.dc.html'},
      {g:'PAGES',title:'Contact',sub:'Bureaux et équipe export',href:'Decor Contact.fr.dc.html'},
      {g:'CATALOGUES PDF',title:'Catalogue produits complet',sub:'PDF · 24,0 MB',href:'Decor Support.fr.dc.html#downloads'},
      {g:'CATALOGUES PDF',title:'Catalogue export',sub:'PDF · 24,0 MB',href:'Decor Export.fr.dc.html'},
      {g:'CATALOGUES PDF',title:'Profil de l’entreprise',sub:'PDF · 6,4 MB',href:'Decor Export.fr.dc.html'},
      {g:'ACTUALITÉS',title:'Dekor ouvre une nouvelle ligne de production',sub:'Nachrichten · Entreprise',href:'Decor Newsroom.fr.dc.html'},
      {g:'ACTUALITÉS',title:'Dekor au salon Big 5 Dubaï',sub:'Salons',href:'Decor Newsroom.fr.dc.html'},
      {g:'CARRIÈRES',title:'Ingénieur en conception',sub:'F&E · Kocaeli',href:'Decor Career.fr.dc.html'},
      {g:'CARRIÈRES',title:'Spécialiste des ventes export',sub:'Istanbul',href:'Decor Career.fr.dc.html'},
      {g:'SUPPORT',title:'Certificats (ISO, CE)',sub:'Documents de conformité',href:'Decor Support.fr.dc.html#downloads'},
      {g:'FAQ',title:'Comment devenir revendeur ?',sub:'FAQ',href:'Decor Become a Dealer.fr.dc.html'},
    ];
    const order=['PRODUITS','CATÉGORIES','PAGES','CATALOGUES PDF','ACTUALITÉS','CARRIÈRES','SUPPORT','FAQ'];
    const match=_sq?SINDEX.filter(it=>(it.title+' '+it.sub+' '+(it.code||'')+' '+it.g).toLowerCase().includes(_sq)):[];
    const flat=[]; const groups=[];
    order.forEach(g=>{ const items=match.filter(it=>it.g===g); if(items.length){ const gi=items.map(it=>{ const fi=flat.length; flat.push(it); return { title:it.title, sub:it.sub, href:it.href, icon, cls: fi===this.state.sActive?'srch-item on':'srch-item', go:()=>this._saveRecent(this.state.query) }; }); groups.push({ label:g, items:gi }); } });
    this._flat=flat; this._flatCount=flat.length;
    let rec=[]; try{ rec=JSON.parse(window.localStorage.getItem('dekorSearchRecent')||'[]'); }catch(e){}
    const recents=rec.map(r=>({ label:r, go:()=>this.onSearch(r) }));
    const popular=['Mètres rubans','Cutters','Niveaux à bulle','Pinces'].map(p=>({ label:p, go:()=>this.onSearch(p) }));
    const quickLinks=[ {label:'Devenir revendeur',href:'Decor Become a Dealer.fr.dc.html'}, {label:'Télécharger le catalogue',href:'Decor Support.fr.dc.html#downloads'}, {label:'Fabrication',href:'Decor Manufacturing.fr.dc.html'}, {label:'Export',href:'Decor Export.fr.dc.html'}, {label:'Contact',href:'Decor Contact.fr.dc.html'} ];
    return {
      searchOpen:this.state.searchOpen, query:this.state.query,
      closeSearch:()=>this.close(), onQuery:(e)=>this.onSearch(e.target.value), stopProp:(e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); },
      groups, hasResults:(_sq.length>0&&flat.length>0), noResults:(_sq.length>0&&flat.length===0), isEmpty:(_sq.length===0),
      recents, hasRecent:recents.length>0, popular, quickLinks,
    };
  }
}
</script>
</body>
</html>
